name: CI

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # フロントエンド: Lint / Format / Test
  # ─────────────────────────────────────────
  frontend-ci:
    name: Frontend CI (Lint / Format / Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint check
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: Run tests with coverage
        run: npm test
        env:
          CI: true

  # ─────────────────────────────────────────
  # バックエンド: Lint / Format / Test
  # ─────────────────────────────────────────
  backend-ci:
    name: Backend CI (Lint / Format / Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run build

      - name: ESLint check
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: Run tests with coverage
        run: npm test

  # ─────────────────────────────────────────
  # CDK: Synth チェック
  # ─────────────────────────────────────────
  cdk-synth:
    name: CDK Synth Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/cdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/cdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: CDK Synth (dry-run)
        run: npx cdk synth --app "npx ts-node bin/app.ts" --context env=dev
        env:
          AWS_DEFAULT_REGION: ap-northeast-1
          # CDK synth のみ実行するため、ダミー認証情報を使用
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy

  # ─────────────────────────────────────────
  # 全ジョブ完了確認（PRマージ保護用）
  # ─────────────────────────────────────────
  ci-success:
    name: All CI checks passed
    runs-on: ubuntu-latest
    needs:
      - frontend-ci
      - backend-ci
      - cdk-synth
    steps:
      - name: All checks passed
        run: echo "All CI checks passed successfully."
