version: 0.2

env:
  variables:
    NODE_ENV: test

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."
      - cd src/frontend
      - npm ci

  pre_build:
    commands:
      - echo "Running lint..."
      - npm run lint
      - echo "Running frontend unit tests..."
      - npm run test -- --run
      - echo "Setting environment variables for build..."
      - |
        cat > .env.production << EOF
        VITE_COGNITO_USER_POOL_ID=${VITE_COGNITO_USER_POOL_ID}
        VITE_COGNITO_CLIENT_ID=${VITE_COGNITO_CLIENT_ID}
        VITE_API_ENDPOINT=${VITE_API_ENDPOINT}
        VITE_AWS_REGION=${VITE_AWS_REGION}
        EOF

  build:
    commands:
      - echo "Building frontend..."
      - npm run build
      - echo "Deploying frontend assets to S3..."
      - aws s3 sync dist/ s3://${FRONTEND_BUCKET}/ --delete --region ${AWS_REGION}
      - echo "Invalidating CloudFront cache..."
      - aws cloudfront create-invalidation --distribution-id ${CLOUDFRONT_DISTRIBUTION_ID} --paths "/*"
      - echo "Frontend build and deployment completed successfully."

reports:
  vitest-coverage:
    files:
      - coverage/clover.xml
    base-directory: src/frontend
    file-format: CLOVERXML