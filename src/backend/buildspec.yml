version: 0.2

env:
  variables:
    NODE_ENV: test

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - echo "Installing dependencies..."
      - cd src/backend
      - npm ci

  pre_build:
    commands:
      - echo "Running lint..."
      - npm run lint
      - echo "Running unit tests..."
      - npm run test:unit

  build:
    commands:
      - echo "Bundling Lambda functions..."
      - npm run bundle
      - echo "Backend CI build completed successfully."

