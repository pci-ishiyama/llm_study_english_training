name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      env:
        description: 'Deploy target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, stg, prod]

env:
  AWS_REGION: ap-northeast-1
  DEPLOY_ENV: ${{ github.event.inputs.env || 'dev' }}

jobs:
  # ============================================================
  # Backend: Test + Build + Deploy to Lambda via CodeBuild
  # ============================================================
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger Backend CodeBuild
        id: backend-build
        run: |
          PROJECT_NAME=$(aws cloudformation describe-stacks \
            --stack-name it-english-trainee-${{ env.DEPLOY_ENV }} \
            --query "Stacks[0].Outputs[?OutputKey=='BackendCodeBuildProjectName'].OutputValue" \
            --output text)

          BUILD_ID=$(aws codebuild start-build \
            --project-name "$PROJECT_NAME" \
            --source-version "${{ github.sha }}" \
            --query 'build.id' \
            --output text)

          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "Started CodeBuild: $BUILD_ID"

      - name: Wait for Backend CodeBuild to complete
        run: |
          BUILD_ID="${{ steps.backend-build.outputs.build_id }}"
          echo "Waiting for build: $BUILD_ID"

          while true; do
            STATUS=$(aws codebuild batch-get-builds \
              --ids "$BUILD_ID" \
              --query 'builds[0].buildStatus' \
              --output text)

            echo "Build status: $STATUS"

            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "Backend build succeeded!"
              break
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "FAULT" ] || [ "$STATUS" = "STOPPED" ] || [ "$STATUS" = "TIMED_OUT" ]; then
              echo "Backend build failed with status: $STATUS"
              exit 1
            fi

            sleep 15
          done

  # ============================================================
  # Frontend: Test + Build + Deploy to S3/CloudFront via CodeBuild
  # ============================================================
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger Frontend CodeBuild
        id: frontend-build
        run: |
          PROJECT_NAME=$(aws cloudformation describe-stacks \
            --stack-name it-english-trainee-${{ env.DEPLOY_ENV }} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendCodeBuildProjectName'].OutputValue" \
            --output text)

          BUILD_ID=$(aws codebuild start-build \
            --project-name "$PROJECT_NAME" \
            --source-version "${{ github.sha }}" \
            --query 'build.id' \
            --output text)

          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "Started CodeBuild: $BUILD_ID"

      - name: Wait for Frontend CodeBuild to complete
        run: |
          BUILD_ID="${{ steps.frontend-build.outputs.build_id }}"
          echo "Waiting for build: $BUILD_ID"

          while true; do
            STATUS=$(aws codebuild batch-get-builds \
              --ids "$BUILD_ID" \
              --query 'builds[0].buildStatus' \
              --output text)

            echo "Build status: $STATUS"

            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "Frontend build succeeded!"
              break
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "FAULT" ] || [ "$STATUS" = "STOPPED" ] || [ "$STATUS" = "TIMED_OUT" ]; then
              echo "Frontend build failed with status: $STATUS"
              exit 1
            fi

            sleep 15
          done

      - name: Output deployed URL
        run: |
          FRONTEND_URL=$(aws cloudformation describe-stacks \
            --stack-name it-english-trainee-${{ env.DEPLOY_ENV }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDomainName'].OutputValue" \
            --output text)
          echo "Deployed to: $FRONTEND_URL"